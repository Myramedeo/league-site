<!-- ROOT BASE -->
{% load static tailwind_tags %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}League Site{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
    {% tailwind_css %}
    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-display { font-family: 'Oswald', sans-serif; }
        .font-scoreboard { font-family: 'IBM Plex Mono', monospace; }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-b from-[#0F1D16] to-[#182E22] text-[#F2F0E6]">

    <nav class="sticky top-0 z-10 border-b border-[#33493B] bg-[#0F1D16]/95 backdrop-blur">
        <div class="mx-auto flex max-w-6xl flex-wrap items-center justify-between gap-y-3 px-6 py-4">
            <a href="{% url 'home' %}" class="font-display flex items-center gap-2 text-lg font-semibold uppercase tracking-wide text-[#F2F0E6] hover:text-[#E8B23D] transition-colors">
                <span aria-hidden="true">⚾</span>
                <span>Hamilton Oldtimers Baseball Organization 55+ Division</span>
            </a>
            <div class="flex flex-wrap items-center gap-x-6 gap-y-2 font-scoreboard text-xs uppercase tracking-[0.15em]">
                <a href="{% url 'team_list' %}" class="text-[#C9CFC3] hover:text-[#E8B23D] transition-colors">Teams</a>
                <a href="{% url 'standings' %}" class="text-[#C9CFC3] hover:text-[#E8B23D] transition-colors">Standings</a>
                <a href="{% url 'leaderboards' %}" class="text-[#C9CFC3] hover:text-[#E8B23D] transition-colors">Stats</a>
                <a href="{% url 'schedule' %}" class="text-[#C9CFC3] hover:text-[#E8B23D] transition-colors">Schedule</a>
            </div>
        </div>
    </nav>

    <main class="mx-auto max-w-6xl px-6 py-10">
        {% block content %}{% endblock %}
    </main>

    <footer class="mt-16 border-t border-[#33493B] py-6">
        <p class="mx-auto max-w-6xl px-6 font-scoreboard text-xs uppercase tracking-[0.15em] text-[#5E6E60]">
            Ironwood Baseball League &middot; Box scores updated after every game
        </p>
    </footer>

</body>
</html>
